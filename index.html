<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevLaunch</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2d35; border-radius: 99px; }
    .dark-scroll::-webkit-scrollbar-thumb { background: #2a2d35; }
    .dark-scroll::-webkit-scrollbar-thumb:hover { background: #ccff0055; }

    /* ── Status indicator ── */
    @keyframes pulse-dot { 0%,100%{box-shadow:0 0 0 0 currentColor;} 50%{box-shadow:0 0 0 5px transparent;} }
    .dot-running { animation: pulse-dot 2s infinite; color: rgba(204,255,0,0.4); }

    /* ── Slide-in animations ── */
    @keyframes slideIn  { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
    @keyframes scaleIn  { from{opacity:0;transform:scale(.97)} to{opacity:1;transform:none} }
    .anim-in    { animation: slideIn  .2s ease forwards; }
    .anim-fade  { animation: fadeIn   .25s ease forwards; }
    .anim-scale { animation: scaleIn  .18s ease forwards; }

    /* ── Toast ── */
    @keyframes toastIn  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
    @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(8px)} }
    .toast-show { animation: toastIn .2s ease forwards; }
    .toast-hide { animation: toastOut .2s ease forwards; }

    /* ── Nav active ── */
    .nav-active { background: #3A3840; color: #DDDFDE; border: 1px solid #484955; border-radius: 10px; }
    .nav-active svg { color: #DDDFDE !important; }

    /* ── Selection ── */
    .selectable { user-select: text !important; -webkit-user-select: text !important; }
    .dragging { opacity: 0.4; transform: scale(0.98); }
    .drag-over { border-top: 2px solid transparent !important; position: relative; }
    .drag-over::before {
      content: '';
      position: absolute;
      top: -1.5px;
      left: 0;
      right: 0;
      height: 2px;
      background: #78787B;
      border-radius: 99px;
      box-shadow: 0 0 10px rgba(120,120,123,0.4);
      z-index: 10;
    }
    .drag-over::after {
      content: '';
      position: absolute;
      top: -4px;
      left: -2px;
      width: 7px;
      height: 7px;
      background: #78787B;
      border-radius: 50%;
      z-index: 11;
      box-shadow: 0 0 8px rgba(120,120,123,0.5);
    }
    .no-anim .anim-in { animation: none !important; }

    /* ── Lime glow ── */
    .lime-glow { box-shadow: 0 0 16px rgba(204,255,0,0.25); }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['JetBrains Mono', 'monospace'] }
        }
      }
    }
  </script>
</head>
<body class="h-screen flex overflow-hidden select-none bg-[#202025] text-[#DDDFDE]">

<!-- ══════════════════════════════════════════
     SIDEBAR (DARK)
══════════════════════════════════════════ -->
<aside class="w-60 bg-[#202025] text-[#DDDFDE] flex flex-col shrink-0 border-r border-[#484955]/30">

  <!-- Logo -->
  <div class="h-14 flex items-center px-5 border-b border-[#484955]/30">
    <img src="logo-devLaunch.svg?v=2" alt="DevLaunch" class="h-8 w-auto">
  </div>

  <!-- Nav -->
  <nav class="flex-1 overflow-y-auto dark-scroll px-3 py-4 space-y-0.5 text-sm">
    <div class="text-[9px] uppercase tracking-widest font-bold text-[#484955] px-2 pb-2">General</div>
    <button id="navAll"     onclick="setView('all')"     class="nav-btn group flex w-full items-center gap-2.5 px-3 py-2 rounded-lg font-medium transition-all hover:bg-[#3A3840] hover:text-[#DDDFDE] border border-transparent">
      <i data-lucide="layout-grid" class="h-4 w-4 text-[#484955] group-hover:text-[#78787B] transition-colors"></i> All Services
      <span id="cntAll" class="ml-auto text-[11px] font-mono text-[#484955]">0</span>
    </button>
    <button id="navRunning" onclick="setView('running')" class="nav-btn group flex w-full items-center gap-2.5 px-3 py-2 rounded-lg font-medium transition-all hover:bg-[#3A3840] hover:text-[#DDDFDE] border border-transparent">
      <i data-lucide="play-circle" class="h-4 w-4 text-[#484955] group-hover:text-green-400 transition-colors"></i> Running
      <span id="cntRunning" class="ml-auto text-[11px] font-mono text-green-500">0</span>
    </button>
    <button id="navStopped" onclick="setView('stopped')" class="nav-btn group flex w-full items-center gap-2.5 px-3 py-2 rounded-lg font-medium transition-all hover:bg-[#3A3840] hover:text-[#DDDFDE] border border-transparent">
      <i data-lucide="stop-circle" class="h-4 w-4 text-[#484955] group-hover:text-rose-400 transition-colors"></i> Stopped
      <span id="cntStopped" class="ml-auto text-[11px] font-mono text-[#484955]">0</span>
    </button>

    <div class="text-[9px] uppercase tracking-widest font-bold text-[#484955] px-2 pt-5 pb-2 flex items-center justify-between">
      projects
    </div>
    <div id="projNav" class="space-y-0.5"></div>
  </nav>

  <!-- Sidebar Footer -->
  <div class="border-t border-[#484955]/30 p-3 flex gap-2">
    <button onclick="doImport()" class="flex-1 py-1.5 text-xs rounded-md border border-[#484955]/50 text-[#78787B] hover:bg-[#3A3840] hover:text-[#DDDFDE] transition-all flex items-center justify-center gap-1.5">
      <i data-lucide="upload" class="h-3 w-3"></i> Import
    </button>
    <button onclick="doExport()" class="flex-1 py-1.5 text-xs rounded-md border border-[#484955]/50 text-[#78787B] hover:bg-[#3A3840] hover:text-[#DDDFDE] transition-all flex items-center justify-center gap-1.5">
      <i data-lucide="download" class="h-3 w-3"></i> Backup
    </button>
  </div>
</aside>

<!-- ══════════════════════════════════════════
     MAIN (LIGHT)
══════════════════════════════════════════ -->
<div class="flex-1 flex flex-col overflow-hidden">

  <!-- Topbar + Quick Add (DARK) -->
  <header class="bg-[#28272e] text-[#DDDFDE] shrink-0 border-b border-[#484955]/30 z-10" style="-webkit-app-region: drag;">

    <!-- Row 1: Title + Stats -->
    <div class="h-11 flex items-center gap-3 px-5 pr-40">
      <span id="viewTitle" class="font-semibold text-sm text-[#DDDFDE] pointer-events-none">All Services</span>
      <div class="h-3.5 w-px bg-[#484955]/60 pointer-events-none"></div>
      <span id="statRun"  class="text-[11px] font-medium text-green-400 bg-green-400/10 rounded-full px-2 py-0.5 leading-none pointer-events-none">0 running</span>
      <span id="statStop" class="text-[11px] font-medium text-[#78787B] bg-[#484955]/20 rounded-full px-2 py-0.5 leading-none pointer-events-none">0 idle</span>
    </div>

    <!-- Row 2: Quick Add inputs -->
    <div class="h-10 flex items-center gap-2 px-5 border-t border-[#484955]/30" style="-webkit-app-region: no-drag;">
      <i data-lucide="zap" class="h-3.5 w-3.5 text-[#78787B] shrink-0"></i>
      <input id="qName"    placeholder="Name"      class="flex-[1.2] bg-[#3A3840] text-[#DDDFDE] placeholder:text-[#484955] border border-[#484955]/40 focus:border-[#484955] rounded-md px-2.5 py-1 text-xs outline-none transition">
      <input id="qProject" placeholder="Project"   list="projList" class="flex-1 bg-[#3A3840] text-[#DDDFDE] placeholder:text-[#484955] border border-[#484955]/40 focus:border-[#484955] rounded-md px-2.5 py-1 text-xs outline-none transition">
      <input id="qCmd"     placeholder="Command"   list="cmdList" class="flex-[1.8] bg-[#3A3840] text-[#DDDFDE] placeholder:text-[#484955] border border-[#484955]/40 focus:border-[#484955] rounded-md px-2.5 py-1 text-xs font-mono outline-none transition">
      <input id="qDir"     placeholder="Directory" class="flex-[1.8] bg-[#3A3840] text-[#DDDFDE] placeholder:text-[#484955] border border-[#484955]/40 focus:border-[#484955] rounded-md px-2.5 py-1 text-xs font-mono outline-none transition">
      <button onclick="qPickDir()" class="h-7 w-7 rounded-md bg-[#3A3840] hover:bg-[#484955] border border-[#484955]/50 flex items-center justify-center transition shrink-0" title="Browse folder">
        <i data-lucide="folder-open" class="h-3.5 w-3.5 text-[#78787B]"></i>
      </button>
      <button onclick="doQuickAdd()" class="h-7 px-3 rounded-md bg-[#484955] hover:bg-[#78787B] active:scale-95 text-[#DDDFDE] text-xs font-semibold transition-all flex items-center gap-1 shrink-0">
        <i data-lucide="plus" class="h-3 w-3"></i> Add
      </button>
    </div>
  </header>

  <!-- Content area -->
  <div id="contentWrap" class="flex-1 overflow-y-auto bg-[#2a2930] dark-scroll relative">

    <!-- Empty state -->
    <div id="emptyState" class="hidden absolute inset-0 flex flex-col items-center justify-center text-center p-10 anim-fade">
      <div class="w-40 h-40 mb-6 relative">
        <img src="logo-devLaunch.svg?v=2" alt="DevLaunch" class="w-full h-full object-contain opacity-20">
        <div class="absolute inset-0 bg-[#CCFF00]/10 blur-3xl -z-10 rounded-full"></div>
      </div>
      <h3 class="text-lg font-bold text-[#DDDFDE] mb-1">No Services Yet</h3>
      <p class="text-[#78787B] text-sm max-w-xs">Use the quick-add bar above or click <strong class="text-[#DDDFDE]">Add Service</strong> to get started.</p>
      <button onclick="openModal()" class="mt-6 px-6 py-2 bg-[#3A3840] hover:bg-[#484955] text-[#DDDFDE] rounded-lg text-sm font-semibold border border-[#484955]/60 transition-all hover:scale-105 active:scale-95">
        Create First Service
      </button>
    </div>

    <!-- Service groups -->
    <div id="servicesList" class="p-6 space-y-6"></div>
  </div>

  <!-- Log Drawer (DARK TERMINAL) -->
  <div id="logDrawer" style="display:none; height:240px" class="bg-[#202025] border-t border-[#484955]/30 flex flex-col relative anim-in shrink-0">
    <!-- Resizer -->
    <div id="logResizer" class="absolute inset-x-0 top-0 h-1 cursor-ns-resize hover:bg-[#484955]/40 transition-colors z-20"></div>
    <!-- Toolbar -->
    <div class="h-9 bg-[#28272e] flex items-center px-4 gap-3 border-b border-[#484955]/30 shrink-0">
      <i data-lucide="terminal" class="h-3.5 w-3.5 text-[#78787B]"></i>
      <span class="text-[11px] font-semibold text-[#78787B]">Console <span class="text-[#DDDFDE] font-mono" id="logSvcName"></span></span>
      <div class="ml-auto flex gap-2">
        <button onclick="copyAllLogs()" class="text-[10px] text-[#78787B] hover:text-[#DDDFDE] px-2 py-0.5 rounded hover:bg-[#3A3840] transition flex items-center gap-1.5">
          <i data-lucide="copy" class="h-3 w-3"></i> Copy All
        </button>
        <button onclick="clearLogs()" class="text-[10px] text-[#78787B] hover:text-[#DDDFDE] px-2 py-0.5 rounded hover:bg-[#3A3840] transition">Clear</button>
        <button onclick="closeLog()" class="h-5 w-5 rounded hover:bg-rose-900/40 hover:text-rose-400 text-[#484955] flex items-center justify-center transition">
          <i data-lucide="x" class="h-3 w-3"></i>
        </button>
      </div>
    </div>
    <!-- Log output -->
    <div id="logBody" class="flex-1 overflow-y-auto dark-scroll p-4 font-mono text-[11.5px] leading-relaxed text-[#78787B] space-y-0.5 selectable"></div>
    <!-- Terminal input -->
    <div class="shrink-0 flex items-center gap-2 px-4 py-2 border-t border-[#484955]/30 bg-[#202025] focus-within:bg-[#28272e] transition-colors">
      <span class="text-green-500 font-bold font-mono">❯</span>
      <input id="termInput" type="text" spellcheck="false" autocomplete="off" placeholder="Enter command..." class="flex-1 bg-transparent border-none outline-none text-[#DDDFDE] font-mono placeholder:text-[#484955] text-[12px]">
      <kbd class="text-[9px] text-[#484955] font-mono border border-[#484955]/40 rounded px-1.5 py-0.5 hidden sm:block">Enter ↵</kbd>
    </div>
  </div>

</div><!-- /main -->


<!-- Modal (DARK) -->
<div id="modalBackdrop" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center anim-fade">
  <div class="bg-[#3A3840] border border-[#484955] w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden anim-scale">
    <div class="flex items-center justify-between px-6 py-4 border-b border-[#484955]/60">
      <h2 id="modalTitle" class="font-bold text-[#DDDFDE] text-base">New Service</h2>
      <button onclick="closeModal()" class="h-8 w-8 rounded-lg hover:bg-[#484955] flex items-center justify-center text-[#78787B] hover:text-[#DDDFDE] transition">
        <i data-lucide="x" class="h-4 w-4"></i>
      </button>
    </div>
    <div class="p-6 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="text-[11px] font-semibold text-[#78787B] uppercase tracking-wider">Service Name *</label>
          <input id="fName" type="text" class="w-full bg-[#202025] border border-[#484955]/60 rounded-lg px-3 py-2 text-sm text-[#DDDFDE] outline-none focus:ring-1 focus:ring-[#484955] focus:border-[#78787B] transition">
        </div>
        <div class="space-y-1">
          <label class="text-[11px] font-semibold text-[#78787B] uppercase tracking-wider">Project *</label>
          <input id="fProject" type="text" list="projList" class="w-full bg-[#202025] border border-[#484955]/60 rounded-lg px-3 py-2 text-sm text-[#DDDFDE] outline-none focus:ring-1 focus:ring-[#484955] focus:border-[#78787B] transition">
        </div>
      </div>
      <div class="space-y-1">
        <label class="text-[11px] font-semibold text-[#78787B] uppercase tracking-wider">Command *</label>
        <input id="fCmd" type="text" list="cmdList" onfocus="this.value=''" class="w-full bg-[#202025] border border-[#484955]/60 rounded-lg px-3 py-2 text-sm font-mono text-[#DDDFDE] outline-none focus:ring-1 focus:ring-[#484955] focus:border-[#78787B] transition" placeholder="npm run dev">
      </div>
      <div class="space-y-1">
        <label class="text-[11px] font-semibold text-[#78787B] uppercase tracking-wider">Directory</label>
        <div class="flex gap-2">
          <input id="fDir" type="text" class="flex-1 bg-[#202025] border border-[#484955]/60 rounded-lg px-3 py-2 text-sm font-mono text-[#DDDFDE] outline-none focus:ring-1 focus:ring-[#484955] focus:border-[#78787B] transition" placeholder="C:\projects\my-app">
          <button onclick="pickDir()" class="px-4 border border-[#484955]/60 rounded-lg text-xs font-semibold text-[#78787B] hover:bg-[#484955] hover:text-[#DDDFDE] transition">Browse</button>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="text-[11px] font-semibold text-[#78787B] uppercase tracking-wider">Local URL</label>
          <input id="fLocalUrl" type="text" class="w-full bg-[#202025] border border-[#484955]/60 rounded-lg px-3 py-2 text-sm font-mono text-[#DDDFDE] outline-none focus:ring-1 focus:ring-[#484955] focus:border-[#78787B] transition" placeholder="http://localhost:3000">
        </div>
        <div class="space-y-1">
          <label class="text-[11px] font-semibold text-[#78787B] uppercase tracking-wider">Network URL</label>
          <input id="fNetworkUrl" type="text" class="w-full bg-[#202025] border border-[#484955]/60 rounded-lg px-3 py-2 text-sm font-mono text-[#DDDFDE] outline-none focus:ring-1 focus:ring-[#484955] focus:border-[#78787B] transition" placeholder="http://192.168.1.5:3000">
        </div>
      </div>
      <div class="space-y-2">
        <label class="text-[11px] font-semibold text-[#78787B] uppercase tracking-wider">Color</label>
        <div id="colorRow" class="flex gap-2.5 pt-0.5"></div>
      </div>
    </div>
    <div class="flex justify-end gap-3 px-6 py-4 border-t border-[#484955]/60 bg-[#202025]/30">
      <button onclick="closeModal()" class="px-5 py-2 rounded-lg border border-[#484955]/60 text-sm text-[#78787B] hover:text-[#DDDFDE] hover:bg-[#484955]/40 transition active:scale-95">Cancel</button>
      <button onclick="saveService()" class="px-5 py-2 rounded-lg bg-[#484955] hover:bg-[#78787B] text-[#DDDFDE] text-sm font-semibold transition active:scale-95">Save</button>
    </div>
  </div>
</div>

<!-- Project Modal (DARK) -->
<div id="projModal" class="hidden fixed inset-0 z-[60] bg-black/50 backdrop-blur-sm flex items-center justify-center anim-fade">
  <div class="bg-[#3A3840] border border-[#484955] w-full max-w-md rounded-2xl shadow-2xl overflow-hidden anim-scale">
    <div class="flex items-center justify-between px-6 py-4 border-b border-[#484955]/60">
      <h2 class="font-bold text-[#DDDFDE] text-base">Project Settings</h2>
      <button onclick="closeProjModal()" class="h-8 w-8 rounded-lg hover:bg-[#484955] flex items-center justify-center text-[#78787B] hover:text-[#DDDFDE] transition"><i data-lucide="x" class="h-4 w-4"></i></button>
    </div>
    <div class="p-6 space-y-4">
      <div class="space-y-1">
        <label class="text-[11px] font-semibold text-[#78787B] uppercase tracking-wider pb-1 block">Project Name</label>
        <div id="pNameDisplay" class="text-sm font-semibold text-[#DDDFDE] bg-[#202025] px-3 py-2 rounded-lg border border-[#484955]/50"></div>
      </div>
      <div class="space-y-1">
        <label class="text-[11px] font-semibold text-[#78787B] uppercase tracking-wider pb-1 block">Root Project Path</label>
        <div class="flex gap-2">
          <input id="pPath" type="text" class="flex-1 bg-[#202025] border border-[#484955]/60 rounded-lg px-3 py-2 text-sm font-mono text-[#DDDFDE] outline-none focus:ring-1 focus:ring-[#484955] focus:border-[#78787B] transition" placeholder="C:\projects\my-project">
          <button onclick="pickPPath()" class="px-4 border border-[#484955]/60 rounded-lg text-xs font-semibold text-[#78787B] hover:bg-[#484955] hover:text-[#DDDFDE] transition">Browse</button>
        </div>
        <p class="text-[10px] text-[#484955] mt-1">Used for the "Open with Antigravity" feature.</p>
      </div>
    </div>
    <div class="flex justify-end gap-3 px-6 py-4 border-t border-[#484955]/60">
      <button onclick="closeProjModal()" class="px-5 py-2 rounded-lg border border-[#484955]/60 text-sm text-[#78787B] hover:text-[#DDDFDE] hover:bg-[#484955]/40 transition">Cancel</button>
      <button onclick="saveProject()" class="px-5 py-2 rounded-lg bg-[#484955] hover:bg-[#78787B] text-[#DDDFDE] text-sm font-semibold transition">Save Settings</button>
</div>

<!-- Toast -->
<div id="toast" class="hidden fixed bottom-5 right-5 z-[100] flex items-center gap-2.5 bg-[#3A3840] text-[#DDDFDE] text-xs font-medium px-4 py-3 rounded-xl shadow-xl border border-[#484955]">
  <div id="toastDot" class="h-2 w-2 rounded-full bg-green-400"></div>
  <span id="toastMsg">–</span>
</div>

<datalist id="projList"></datalist>
<datalist id="cmdList">
  <option value="npm run dev">
  <option value="npm run start:dev">
  <option value="npm start">
  <option value="npm run build">
  <option value="npm test">
  <option value="yarn dev">
  <option value="yarn start:dev">
  <option value="pnpm dev">
  <option value="pnpm run start:dev">
  <option value="go run main.go">
  <option value="python manage.py runserver">
</datalist>

<script>
// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
const COLORS = ['#CCFF00','#4ade80','#38bdf8','#a78bfa','#fb923c','#f472b6','#fbbf24','#ef4444','#6ee7b7'];
let S = { services:[], projects:{}, projectOrder:[], view:'all', logOpenId:null, editId:null, editProj:null, color:COLORS[0] };
let isResizing = false;
let cmdHistory = [], histIdx = -1;

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
async function init() {
  buildColorRow();
  if (window.api) {
    const d = await window.api.loadData();
    S.services = d.services || [];
    S.projects = d.projects || {};
    S.projectOrder = d.projectOrder || [];
    const running = await window.api.getRunningIds();
    S.services.forEach(s => { if (!running.includes(s.id) && s.status==='running') s.status='stopped'; });
    window.api.onLogLine(({id, line}) => { if (S.logOpenId===id) appendLog(line); });
    window.api.onStatusChange(({id, status}) => { const s=S.services.find(x=>x.id===id); if(s){s.status=status;persist();render();} });
    window.api.onUrlDetected(({id, local, network}) => {
      const s=S.services.find(x=>x.id===id); if(!s) return;
      if(local   && !s.localUrl)   s.localUrl   = local;
      if(network && !s.networkUrl) s.networkUrl = network;
      if(local   && !s.url)        s.url        = local;
      persist(); render();
    });
  } else {
    S.services=[
      {id:1,name:'Frontend Web',project:'Alpha Core',cmd:'npm run dev',dir:'C:/dev/alpha/web',localUrl:'http://localhost:3000',networkUrl:'http://192.168.1.5:3000',status:'running',color:'#6366f1'},
      {id:2,name:'API Server',project:'Alpha Core',cmd:'go run main.go',dir:'C:/dev/alpha/api',localUrl:'http://localhost:8080',networkUrl:null,status:'stopped',color:'#6366f1'},
      {id:3,name:'Analytics',project:'Data Hub',cmd:'python manage.py run',dir:'C:/dev/hub',localUrl:null,networkUrl:null,status:'stopped',color:'#10b981'},
    ];
  }
  render();
}

function persist() { if(window.api) window.api.saveData({services:S.services, projects:S.projects, projectOrder:S.projectOrder}); }

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function render(skipAnim = false) {
  if (skipAnim) document.body.classList.add('no-anim');
  
  const all  = S.services;
  const filt = filtered();
  const running = all.filter(x=>x.status==='running').length;
  const stopped = all.filter(x=>x.status!=='running').length;

  set('cntAll', all.length);
  set('cntRunning', running);
  set('cntStopped', stopped);
  set('statRun', `${running} running`);
  set('statStop', `${stopped} idle`);

  // Sidebar project nav
  const projs = [...new Set(all.map(s=>s.project))];
  document.getElementById('projNav').innerHTML = projs.map(p=>{
    const col = all.find(s=>s.project===p)?.color||'#6366f1';
    const cnt = all.filter(s=>s.project===p).length;
    const active = S.view===`proj:${p}`;
    return `<div class="group flex w-full items-center gap-1.5 px-2 py-1 rounded-lg transition-all hover:bg-[#3A3840] ${active?'bg-[#3A3840] text-[#DDDFDE]':'text-[#78787B]'}">
      <button onclick="setView('proj:${encodeURIComponent(p)}')" class="flex-1 flex items-center gap-2.5 py-1 overflow-hidden text-left">
        <div class="h-1.5 w-1.5 rounded-full shrink-0" style="background:${col}"></div>
        <span class="truncate text-[12px] ${active?'font-semibold text-[#DDDFDE]':''}"> ${p}</span>
      </button>
      <button onclick="openProjModal('${p}')" class="h-6 w-6 rounded-md flex items-center justify-center hover:bg-[#484955] opacity-0 group-hover:opacity-100 transition-opacity text-[#78787B] hover:text-[#DDDFDE]">
        <i data-lucide="settings" class="h-3.5 w-3.5"></i>
      </button>
      <span class="text-[10px] font-mono text-[#484955] min-w-[12px] text-center">${cnt}</span>
    </div>`;
  }).join('');

  // Datalist
  document.getElementById('projList').innerHTML = projs.map(p=>`<option value="${p}">`).join('');

  // Nav highlight
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('nav-active'));
  const navMap = {all:'navAll', running:'navRunning', stopped:'navStopped'};
  if (navMap[S.view]) document.getElementById(navMap[S.view]).classList.add('nav-active');

  // Empty state
  let groups = [...new Set(filt.map(s=>s.project))];
  
  if (S.projectOrder && S.projectOrder.length > 0) {
    groups.sort((a, b) => {
      let idxA = S.projectOrder.indexOf(a);
      let idxB = S.projectOrder.indexOf(b);
      if (idxA === -1) idxA = 999;
      if (idxB === -1) idxB = 999;
      return idxA - idxB;
    });
  }

  document.getElementById('emptyState').classList.toggle('hidden', groups.length>0);
  document.getElementById('servicesList').classList.toggle('hidden', groups.length===0);

  // List
  document.getElementById('servicesList').innerHTML = groups.map(proj=>{
    const svcs = filt.filter(s=>s.project===proj);
    const col = svcs[0].color;
    const runCnt = svcs.filter(s=>s.status==='running').length;
    const pData = S.projects[proj] || {};
    const logoVal = pData.logo || proj.charAt(0).toUpperCase();
    const isImage = logoVal.startsWith('data:image/') || logoVal.startsWith('http');
    const logoContent = isImage ? `<img src="${logoVal}" class="w-full h-full object-cover rounded-lg" />` : logoVal;

    return `<div class="anim-in bg-[#2e2d35] border border-[#484955]/50 rounded-xl p-4 relative proj-group-container hover:border-[#484955] transition-colors"

        <button onclick="promptEditLogo('${proj}')" title="Change Logo" class="h-7 w-7 rounded-lg flex items-center justify-center text-[13px] font-bold text-white shadow-sm transition hover:scale-105 shrink-0 select-none overflow-hidden" style="background:${isImage ? 'transparent' : col+'22'}">
          ${logoContent}

function svcCard(s) {
  const r = s.status==='running', st = s.status==='starting', err = s.status==='error';
  const localUrl   = s.localUrl   || s.url || null;
  const networkUrl = s.networkUrl || null;
  
  const mkBadge = (href, label, dotColor) => {
    const display = href.replace(/^https?:\/\//, '');
    return `
    <div class="group/url inline-flex items-center rounded-md border overflow-hidden ${label==='Local' ? 'border-[#484955]/60 bg-[#484955]/15' : 'border-[#484955]/40 bg-[#484955]/10'} transition-all">
      <button onclick="openUrl('${href}')" title="Open ${href}"
        class="flex items-center gap-1.5 px-2 py-0.5 text-[10px] font-medium transition-colors ${label==='Local' ? 'text-[#DDDFDE] hover:bg-[#484955]/30' : 'text-[#78787B] hover:bg-[#484955]/20'}">
        <span class="h-1.5 w-1.5 rounded-full ${dotColor}"></span>
        <span class="font-mono">${label}</span>
        <span class="opacity-60 max-w-[120px] truncate">${display}</span>
        <i data-lucide="external-link" class="h-2.5 w-2.5 opacity-40"></i>
      </button>
      <button onclick="copyUrl('${href}')" title="Copy URL"

        <i data-lucide="copy" class="h-2.5 w-2.5"></i>
      </button>
    </div>`;
  };

  return `<div class="group bg-[#3A3840] border border-[#484955]/50 rounded-xl px-2 py-2 flex items-center gap-2 hover:border-[#484955] hover:bg-[#3c3b43] transition-all anim-in"
       draggable="true" 
       ondragstart="handleDragStart(event, ${s.id})"
       ondragover="handleDragOver(event)"
       ondragleave="handleDragLeave(event)"
       ondrop="handleDrop(event, ${s.id})"
       ondragend="handleDragEnd(event)">
    
    <div class="cursor-grab active:cursor-grabbing px-1 text-[#484955] hover:text-[#78787B] transition-colors shrink-0 -ml-1">
      <i data-lucide="grip-vertical" class="h-4 w-4"></i>
    </div>

    <div class="h-1.5 w-1.5 rounded-full ${r ? 'bg-green-400 dot-running' : st ? 'bg-amber-400 animate-pulse' : err ? 'bg-rose-500' : 'bg-slate-700'} shrink-0 ml-1"></div>
    
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="text-sm font-semibold text-[#DDDFDE] leading-none">${s.name}</span>
        <div class="flex items-center gap-1.5 flex-wrap">
          ${localUrl   ? mkBadge(localUrl,   'Local',   'bg-green-400')   : ''}
          ${networkUrl ? mkBadge(networkUrl, 'Network', 'bg-[#78787B]')  : ''}
        </div>
      </div>
      <div class="text-[10px] font-mono text-[#484955] truncate mt-1 flex items-center gap-2">
        <span class="bg-[#484955]/30 px-1.5 py-0.5 rounded text-[#78787B] scale-90 origin-left">${s.cmd}</span>
        ${s.dir ? `<span class="opacity-50 truncate text-[#78787B]">${s.dir}</span>` : ''}
      </div>
    </div>

    <div class="flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity pr-1">
      ${r
        ? `<button onclick="doStop(${s.id})"    title="Stop"    class="h-7 w-7 rounded-lg hover:bg-rose-500/15 hover:text-rose-400 flex items-center justify-center transition text-[#DDDFDE]"><i data-lucide="square" class="h-3.5 w-3.5"></i></button>`

      <button onclick="openLog(${s.id})"   title="Log"     class="h-7 w-7 rounded-lg hover:bg-[#484955] hover:text-white flex items-center justify-center transition text-[#DDDFDE]"><i data-lucide="terminal" class="h-3.5 w-3.5"></i></button>
      <div class="h-4 w-px bg-[#484955]/50 mx-0.5"></div>
      <button onclick="openDir(${s.id})"   title="Folder"  class="h-7 w-7 rounded-lg hover:bg-[#484955] hover:text-white flex items-center justify-center transition text-[#DDDFDE]"><i data-lucide="folder" class="h-3.5 w-3.5"></i></button>

  </div>`;

// ─────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────
function filtered() {
  if (S.view==='running') return S.services.filter(s=>s.status==='running');
  if (S.view==='stopped') return S.services.filter(s=>s.status!=='running');
  if (S.view.startsWith('proj:')) return S.services.filter(s=>s.project===decodeURIComponent(S.view.slice(5)));
  return S.services;
}

function setView(v) {
  S.view = v;
  const t = {all:'All Services', running:'Active Processes', stopped:'Inactive Services'};
  set('viewTitle', t[v] || decodeURIComponent(v.slice(5)));
  render();
}

async function doStart(id) {
  const s = S.services.find(x=>x.id===id); if(!s) return;
  s.status='starting'; render();
  if (window.api) await window.api.startService(s);
  else setTimeout(()=>{s.status='running';render();},1000);
}

async function doStop(id) {
  const s = S.services.find(x=>x.id===id); if(!s) return;
  s.status='stopped'; persist(); render();
  if (window.api) await window.api.stopService(id);
}

async function doRestart(id) {
  const s = S.services.find(x=>x.id===id); if(!s) return;
  s.status='starting'; render();
  if (window.api) await window.api.restartService(s);
  else setTimeout(()=>{s.status='running';render();},1200);
}

function groupAction(proj, act) {
  S.services.filter(s=>s.project===proj).forEach(s=>{
    if (act==='start'&&s.status!=='running') doStart(s.id);
    if (act==='stop'&&s.status==='running')  doStop(s.id);
  });
}

function openUrl(url) { window.api ? window.api.openUrl(url) : window.open(url,'_blank'); }

function openDir(id) {
  const s=S.services.find(x=>x.id===id);
  if(s?.dir&&window.api) window.api.openFolder(s.dir);
}

// ─────────────────────────────────────────
// DRAG & DROP
// ─────────────────────────────────────────
let draggedId = null;

function handleDragStart(e, id) {
  draggedId = id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function handleDragOver(e) {
  e.preventDefault();
  const card = e.currentTarget;
  if (card.classList.contains('dragging')) return;
  card.classList.add('drag-over');
}
function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function handleDragEnd(e) { e.currentTarget.classList.remove('dragging'); }

function handleDrop(e, targetId) {
  e.preventDefault();
  e.stopPropagation();
  const card = e.currentTarget;
  card.classList.remove('drag-over');
  if (draggedId === targetId) return;

  const fromIdx = S.services.findIndex(x => x.id === draggedId);
  const toIdx   = S.services.findIndex(x => x.id === targetId);
  if (fromIdx === -1 || toIdx === -1) return;

  // Move in array
  const [removed] = S.services.splice(fromIdx, 1);
  S.services.splice(toIdx, 0, removed);

  persist();
  render(true); // Skip animations for seamless reorder
}

// ── Project Drag & Drop ──────────────────────────────────
let draggedProj = null;

function handleProjDragStart(e, proj) {
  draggedProj = proj;
  e.dataTransfer.effectAllowed = 'move';
  const container = e.target.closest('.proj-group-container');
  if (container) setTimeout(() => container.classList.add('opacity-50'), 0);
  e.stopPropagation();
}

function handleProjDragOver(e) {
  if (!draggedProj) return;
  e.preventDefault();
  const container = e.currentTarget;
  const indicator = container.querySelector('.proj-drop-indicator');
  if (indicator) indicator.style.opacity = '1';
}

function handleProjDragLeave(e) {
  if (!draggedProj) return;
  const container = e.currentTarget;
  const indicator = container.querySelector('.proj-drop-indicator');
  if (indicator) indicator.style.opacity = '0';
}

function handleProjDragEnd(e) {
  const container = e.target.closest('.proj-group-container');
  if (container) container.classList.remove('opacity-50');
  document.querySelectorAll('.proj-drop-indicator').forEach(el => el.style.opacity = '0');
  draggedProj = null;
}

function handleProjDrop(e, targetProj) {
  e.preventDefault();
  e.stopPropagation();
  const container = e.currentTarget;
  const indicator = container.querySelector('.proj-drop-indicator');
  if (indicator) indicator.style.opacity = '0';
  
  if (!draggedProj || draggedProj === targetProj) return;
  
  if (!S.projectOrder || S.projectOrder.length === 0) {
    S.projectOrder = [...new Set(S.services.map(s => s.project))];
  }
  
  const fromIdx = S.projectOrder.indexOf(draggedProj);
  const toIdx   = S.projectOrder.indexOf(targetProj);
  if (fromIdx === -1 || toIdx === -1) {
    // Edge case if one is missing
    S.projectOrder = [...new Set(S.services.map(s => s.project))];
    return;
  }
  
  S.projectOrder.splice(fromIdx, 1);
  S.projectOrder.splice(toIdx, 0, draggedProj);
  
  persist();
  render(true);
}

// ── Logo Editor ──────────────────────────────────────────
function promptEditLogo(proj) {
  const currentLogo = S.projects[proj]?.logo;
  const isImage = currentLogo?.startsWith('data:image/') || currentLogo?.startsWith('http');

  if (isImage) {
    if (confirm('Bạn muốn Xóa logo hiện tại không? (Nhấn OK để xóa đưa về chữ, nhấn Cancel để Đổi ảnh mới)')) {
      S.projects[proj].logo = null;
      persist();
      render(true);
      toast('Đã xóa biểu tượng dự án!');
      return;
    }
  }

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/png, image/jpeg, image/jpg, image/svg+xml, image/webp';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // Check size limit (e.g., max 2MB)
    if (file.size > 2 * 1024 * 1024) {
      toast('Vui lòng chọn ảnh có kích thước dưới 2MB', 'error');
      return;
    }

    const reader = new FileReader();
    reader.onload = (ev) => {
      const base64 = ev.target.result;
      if (!S.projects[proj]) S.projects[proj] = {};
      S.projects[proj].logo = base64;
      persist();
      render(true);
      toast('Đã cập nhật biểu tượng dự án!');
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function deleteSvc(id) {
  if(!confirm('Remove this service?')) return;
  S.services=S.services.filter(x=>x.id!==id);
  if(S.logOpenId===id) closeLog();
  persist(); render(); toast('Service removed','error');
}

// ─────────────────────────────────────────
// LOG / CONSOLE
// ─────────────────────────────────────────
async function openLog(id) {
  const s=S.services.find(x=>x.id===id); if(!s) return;
  S.logOpenId=id;
  set('logSvcName', s.name);
  const drawer=document.getElementById('logDrawer');
  drawer.style.display='flex';
  document.getElementById('logBody').innerHTML='';
  if (window.api) {
    const logs=await window.api.getLogs(id);
    logs.forEach(l=>appendLog(l));
  } else {
    appendLog({time:now(),type:'info',text:`Starting: ${s.cmd}`});
    appendLog({time:now(),type:'success',text:`✓ Process ready at ${s.url||'localhost'}`});
    appendLog({time:now(),type:'plain',text:'GET / 200 12ms'});
  }
  setTimeout(()=>document.getElementById('termInput').focus(),80);
}

function appendLog(l) {
  const body=document.getElementById('logBody');
  const d=document.createElement('div');
  d.className='flex gap-3';
  const colMap={info:'text-blue-400',success:'text-green-400',warn:'text-amber-400',error:'text-rose-400',plain:'text-[#78787B]'};
  d.innerHTML=`<span class="text-[#484955] shrink-0 select-none">${l.time}</span><span class="${colMap[l.type]||'text-[#DDDFDE]'}">${esc(l.text)}</span>`;
  body.appendChild(d);
  body.scrollTop=body.scrollHeight;
}

function clearLogs() { document.getElementById('logBody').innerHTML=''; }
function closeLog()  { S.logOpenId=null; document.getElementById('logDrawer').style.display='none'; }

// Terminal input
document.getElementById('termInput').addEventListener('keydown', async e=>{
  if(!S.logOpenId) return;
  if(e.ctrlKey&&e.key==='c'){
    appendLog({time:now(),type:'error',text:'^C — Stopping process…'});
    doStop(S.logOpenId);
    e.target.value=''; e.preventDefault(); return;
  }
  if(e.key==='Enter'){
    const text=e.target.value;
    appendLog({time:now(),type:'info',text:`❯ ${text}`});
    if(window.api) await window.api.sendInput(S.logOpenId,text);
    if(text.trim()){cmdHistory.unshift(text); if(cmdHistory.length>50)cmdHistory.pop();}
    histIdx=-1; e.target.value=''; e.preventDefault();
  }
  if(e.key==='ArrowUp')  { histIdx=Math.min(histIdx+1,cmdHistory.length-1); e.target.value=cmdHistory[histIdx]||''; e.preventDefault(); }
  if(e.key==='ArrowDown'){ histIdx=Math.max(histIdx-1,-1); e.target.value=histIdx>=0?cmdHistory[histIdx]:''; e.preventDefault(); }
});

document.getElementById('logResizer').addEventListener('mousedown',e=>{isResizing=true;document.body.style.cursor='ns-resize';e.preventDefault();});

  document.getElementById('fDir').value        = s?.dir||'';
  document.getElementById('fLocalUrl').value   = s?.localUrl || s?.url || '';
  document.getElementById('fNetworkUrl').value = s?.networkUrl || '';

  buildColorRow();
  document.getElementById('modalBackdrop').classList.remove('hidden');
  setTimeout(()=>document.getElementById('fName').focus(),50);
}

function closeModal() { document.getElementById('modalBackdrop').classList.add('hidden'); }

function saveService() {
  const name=val('fName'),project=val('fProject'),cmd=val('fCmd'),dir=val('fDir'),localUrl=val('fLocalUrl'),networkUrl=val('fNetworkUrl');
  if(!name||!project||!cmd){ toast('Required fields missing','error'); return; }
  const data = {name,project,cmd,dir,localUrl,networkUrl,url:localUrl,color:S.color};
  if(S.editId) Object.assign(S.services.find(x=>x.id===S.editId), data);
  else S.services.push({id:Date.now(), ...data, status:'stopped'});
  persist(); render(); closeModal(); toast('Saved!');
}

  document.getElementById('colorRow').innerHTML=COLORS.map(c=>`

}

  document.getElementById('pNameDisplay').innerText = name;
  document.getElementById('pPath').value = S.projects[name]?.path || '';
  document.getElementById('projModal').classList.remove('hidden');
  lucide.createIcons();
}
function closeProjModal() { document.getElementById('projModal').classList.add('hidden'); }
function saveProject() {
  const path = document.getElementById('pPath').value.trim();
  if (!S.projects[S.editProj]) S.projects[S.editProj] = {};
  S.projects[S.editProj].path = path;
  persist(); closeProjModal(); toast(`Settings for ${S.editProj} saved`);
}

// ─────────────────────────────────────────
// BACKUP
// ─────────────────────────────────────────
async function doExport() {
  const data={version:1,exportedAt:new Date().toISOString(),services:S.services};
  if(window.api){const r=await window.api.exportBackup(data);if(r.ok)toast('Backup exported');}
}
async function doImport() {
  if(window.api){const d=await window.api.importBackup();if(d?.services){const ex=new Set(S.services.map(s=>s.id));let n=0;d.services.forEach(s=>{if(!ex.has(s.id)){S.services.push(s);n++;}});persist();render();toast(`Imported ${n} services`);}}
}

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
let _toastT;
function toast(msg, type='ok') {
  const el=document.getElementById('toast'), dot=document.getElementById('toastDot');
  document.getElementById('toastMsg').innerText=msg;
  dot.className=`h-2 w-2 rounded-full ${type==='error'?'bg-rose-400':'bg-green-400'}`;
  el.classList.remove('hidden','toast-hide'); el.classList.add('toast-show');
  clearTimeout(_toastT); _toastT=setTimeout(()=>{el.classList.add('toast-hide');setTimeout(()=>el.classList.add('hidden'),200);},3000);
}

function set(id,v) { document.getElementById(id).innerText=v; }
function val(id)   { return document.getElementById(id).value.trim(); }
function now()     { return new Date().toLocaleTimeString('vi-VN'); }
function esc(t)    { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyUrl(url) {
  navigator.clipboard.writeText(url)
    .then(() => toast('✓ Copied: ' + url.replace(/^https?:\/\//, '')))
    .catch(() => {
      // Fallback for Electron context
      const el = document.createElement('input');
      el.value = url; document.body.appendChild(el);
      el.select(); document.execCommand('copy');
      document.body.removeChild(el);
      toast('✓ Copied: ' + url.replace(/^https?:\/\//, ''));
    });
}

function copyAllLogs() {
  const body = document.getElementById('logBody');
  const text = body.innerText;
  if (!text) { toast('No logs to copy', 'warn'); return; }
  
  navigator.clipboard.writeText(text)
    .then(() => toast('✓ Copied all logs to clipboard'))
    .catch(() => {
      const el = document.createElement('textarea');
      el.value = text; document.body.appendChild(el);
      el.select(); document.execCommand('copy');
      document.body.removeChild(el);
      toast('✓ Copied all logs to clipboard');
    });
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') { closeModal(); closeLog(); }
  if(e.key==='Enter'&&document.getElementById('modalBackdrop').classList.contains('hidden')===false) {
    if(e.target.tagName!=='BUTTON') saveService();
  }
});

init();
</script>
